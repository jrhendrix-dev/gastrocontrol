server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://gastrocontrol-api:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts — defaults are too low for Podman's DNS resolution overhead
    proxy_connect_timeout  30s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # Buffer settings — prevents 502 on larger JSON responses
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;
  }

  location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
